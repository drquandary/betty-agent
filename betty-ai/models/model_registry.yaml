# =============================================================================
# Betty Cluster — LLM Model Registry
# =============================================================================
# Resource requirements for popular LLMs on PARCC Betty (NVIDIA B200 GPUs).
#
# Hardware reference:
#   - B200 full GPU:  192 GB VRAM
#   - MIG-90 slice:    90 GB VRAM
#   - MIG-45 slice:    45 GB VRAM
#
# VRAM estimation rules:
#   FP16 weights:          ~2 bytes/param  -> params_b * 2 GB
#   FP16 full fine-tune:   ~16-18 bytes/param (model + grads + AdamW states)
#   LoRA FP16:             base FP16 + ~5-10% adapter/optimizer overhead
#   QLoRA 4-bit:           ~0.5 bytes/param + ~0.5-1 GB LoRA overhead
#   Add 2-4 GB for KV cache, activations, framework overhead
# =============================================================================

models:

  # ---------------------------------------------------------------------------
  # Meta Llama 3 family
  # ---------------------------------------------------------------------------
  - hf_id: meta-llama/Meta-Llama-3-8B
    params_b: 8.0
    architecture: llama
    gated: true
    license: Meta Llama 3 Community License
    vram_gb:
      fp16_inference: 19
      fp16_full_finetune: 140
      lora_fp16: 22
      qlora_4bit: 7
    recommended:
      inference:
        partition: b200-mig45
        gpus: 1
        method: vllm-fp16
      lora:
        partition: b200-mig45
        gpus: 1
        deepspeed_config: null
      full_finetune:
        partition: dgx-b200
        gpus: 1
        deepspeed_config: ds_zero2.json
    tokens_per_sec_b200: 12000
    notes: >-
      Gated model; request access at huggingface.co/meta-llama and set
      HF_TOKEN. Base (non-instruct) model, best for continued pre-training
      or custom fine-tuning.

