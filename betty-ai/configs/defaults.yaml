# Betty AI — Team Defaults
# Shared preferences that apply to all team members unless overridden in team.yaml

training:
  default_method: "lora"
  default_epochs: 3
  default_learning_rate: 2.0e-4
  default_batch_size: 4
  default_gradient_accumulation: 4
  default_max_seq_length: 2048
  default_lora_r: 16
  default_lora_alpha: 32
  default_lora_dropout: 0.05
  default_lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  use_bf16: true
  use_flash_attention: true
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  warmup_ratio: 0.03
  weight_decay: 0.01
  gradient_checkpointing: true

inference:
  default_port: 8000
  default_max_model_len: 4096
  default_quantization: null  # null, awq, gptq, or squeezellm
  # Available inference backends. Pick one when invoking the agent.
  #   local-vllm   : spin up vLLM on a Betty GPU allocation (default, full control)
  #   litellm-parcc: call PARCC's hosted LiteLLM gateway (no GPU allocation needed)
  default_provider: "local-vllm"

providers:
  litellm-parcc:
    base_url: "https://litellm.parcc.upenn.edu/v1"
    chat_endpoint: "/chat/completions"
    # OpenAI-compatible API. Set api_key in team.yaml (gitignored), not here.
    # Models are namespaced as "openai/<model>", e.g. "openai/gpt-oss-120b".
    default_model: "openai/gpt-oss-120b"
    default_max_tokens: 100
    default_temperature: 0.5

slurm:
  walltime_buffer_factor: 1.3  # multiply estimated time by this for --time
  min_walltime_hours: 1
  max_walltime_hours: 168  # 7 days

cost:
  warn_threshold_pct: 25  # warn if job costs > this % of remaining allocation
